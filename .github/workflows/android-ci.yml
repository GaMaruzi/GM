name: Android CI

# Builda o app a cada push/PR que toca em /android.
# Requer o gradle-wrapper.jar commitado (gerado pelo Android Studio na primeira
# vez que abrir o projeto). Se este workflow falhar com "gradlew: not found",
# rode `cd android && gradle wrapper --gradle-version 8.10.2` localmente e commite.

on:
  push:
    branches: [main]
    paths:
      - 'android/**'
      - '.github/workflows/android-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'android/**'

# Cancela builds antigos do mesmo branch para economizar minutos.
concurrency:
  group: android-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle (com cache)
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Lint
        working-directory: android
        run: ./gradlew lintDebug --no-daemon

      - name: Testes unitários
        working-directory: android
        run: ./gradlew testDebugUnitTest --no-daemon
